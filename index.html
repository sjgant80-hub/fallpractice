<script>

 *  - Universal entry: FallKit.aiComplete(systemPrompt, userMsg, maxTokens) → string|null

 *  - WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN)
 *  - Help section partial: FallKit.helpSection()

 *
 * Doctrine (per botler CLAUDE.md):
 *  - T0 fallback ALWAYS works · aiComplete returns null · caller MUST degrade gracefully
 *  - NEVER hide a feature behind AI · NEVER proxy API keys · NEVER log keys
 *  - WebLLM is lazy-loaded · model weights download ONLY on user opt-in
 *
 * Estate-first canonical references:
 *  - WebLLM pattern: Downloads/botler/index.html (T0/T2/T3 cascade)
 *  - WebRTC pattern: Downloads/fallnet/fallnet-shim.js (raw RTCPeerConnection)
 *  - Konomi seal:    ◊·κ=1  (consistent across all estate seeds)
 *  - Mesh channel:   'fall-signal'
 */
(function (root) {
  'use strict';

  const FALL_KIT_VERSION = '1.2.0';
  const KCC_MINT_URL = 'https://sjgant80-hub.github.io/kcc-mint/';

  // ─── Model registry ──────────────────────────────────────────────
  const WEBLLM_MODELS = {
    'llama-1b':  { id: 'Llama-3.2-1B-Instruct-q4f16_1-MLC',   size: '~700MB', label: '1B · fast · any laptop / phone' },
    'llama-3b':  { id: 'Llama-3.2-3B-Instruct-q4f16_1-MLC',   size: '~2GB',   label: '3B · balanced · default · most laptops' },
    'qwen-7b':   { id: 'Qwen2.5-7B-Instruct-q4f16_1-MLC',     size: '~5GB',   label: '7B · capable · needs decent GPU (M-series Mac / 8GB+ VRAM)' },
    'llama-8b':  { id: 'Llama-3.1-8B-Instruct-q4f16_1-MLC',   size: '~5GB',   label: '8B · common · needs decent GPU' },
    'llama-70b': { id: 'Llama-3.1-70B-Instruct-q4f16_1-MLC',  size: '~40GB',  label: '70B · frontier · needs serious GPU + 64GB+ RAM' },
  };
  const DEFAULT_MODEL = 'llama-3b';

  const T3_PROVIDERS = {
    anthropic: { label: 'Anthropic Claude', models: ['claude-sonnet-4-5','claude-opus-4-7','claude-haiku-4-5'], default: 'claude-sonnet-4-5', url: 'https://api.anthropic.com/v1/messages' },
    openai:    { label: 'OpenAI',           models: ['gpt-4o','gpt-4o-mini','o1-mini'],                          default: 'gpt-4o-mini',      url: 'https://api.openai.com/v1/chat/completions' },
    google:    { label: 'Google Gemini',    models: ['gemini-1.5-pro','gemini-1.5-flash','gemini-2.0-flash-exp'], default: 'gemini-1.5-flash', url: 'https://generativelanguage.googleapis.com/v1beta/models/' },
  };

  // ─── State ───────────────────────────────────────────────────────
  const STATE = {
    config: loadConfig(),
    ai: { ready: false, loading: false, progress: 0, engine: null, model: null },
    mesh: { active: false, peers: new Map(), bc: null, signal: null },
  };

  function loadConfig() {
    try { return JSON.parse(localStorage.getItem('fall-kit.config') || '{}'); }
    catch (e) { return {}; }
  }
  function saveConfig() {
    try { localStorage.setItem('fall-kit.config', JSON.stringify(STATE.config)); } catch (e) {}
  }

  // ─── DOM helpers ─────────────────────────────────────────────────
  function $(s, root) { return (root || document).querySelector(s); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  // ─── AI tier ─────────────────────────────────────────────────────
  function aiTier() { return STATE.config.ai_tier || 'T0'; }

  function renderAiChip() {
    const chip = $('#fk-ai-chip');
    if (!chip) return;
    const txt = $('#fk-ai-chip-text');
    chip.classList.remove('fk-chip-live', 'fk-chip-loading', 'fk-chip-warn');
    const tier = aiTier();
    if (tier === 'T0') { txt.textContent = 'T0 · off'; }
    else if (tier === 'T2') {
      if (STATE.ai.ready) { txt.textContent = 'T2 ' + (WEBLLM_MODELS[STATE.config.webllm_model || DEFAULT_MODEL]?.label.split(' · ')[0] || '') + ' · ready'; chip.classList.add('fk-chip-live'); }
      else if (STATE.ai.loading) { txt.textContent = 'T2 loading ' + Math.round(STATE.ai.progress) + '%'; chip.classList.add('fk-chip-loading'); }
      else { txt.textContent = 'T2 · click to load'; chip.classList.add('fk-chip-warn'); }
    } else if (tier === 'T3') {
      if (STATE.config.api_key) { txt.textContent = 'T3 ' + (T3_PROVIDERS[STATE.config.api_provider]?.label || 'BYOK') + ' · active'; chip.classList.add('fk-chip-live'); }
      else { txt.textContent = 'T3 · no key set'; chip.classList.add('fk-chip-warn'); }
    }
  }

  async function loadWebLLM(modelKey) {
    if (STATE.ai.loading) return;
    const key = modelKey || STATE.config.webllm_model || DEFAULT_MODEL;
    const model = WEBLLM_MODELS[key];
    if (!model) { console.error('fall-kit: unknown model', key); return; }
    if (STATE.ai.ready && STATE.ai.model === model.id) return;
    STATE.ai.loading = true; STATE.ai.progress = 0; renderAiChip();
    notify('Loading WebLLM · ' + model.label + ' · ' + model.size + ' first time', 'info');
    try {
      const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm@0.2.79');
      const engine = await CreateMLCEngine(model.id, {
        initProgressCallback: p => { STATE.ai.progress = (p.progress || 0) * 100; renderAiChip(); }
      });
      STATE.ai.engine = engine;
      STATE.ai.model = model.id;
      STATE.ai.ready = true;
      STATE.ai.loading = false;
      STATE.config.webllm_model = key; saveConfig();
      renderAiChip();
      notify('WebLLM ready · sovereign mode · ' + model.label.split(' · ')[0], 'ok');
    } catch (e) {
      console.error('fall-kit: WebLLM load failed', e);
      STATE.ai.loading = false; renderAiChip();
      notify('WebLLM load failed · ' + e.message, 'err');
    }
  }

  async function aiComplete(systemPrompt, userMsg, maxTokens) {
    maxTokens = maxTokens || 600;
    const tier = aiTier();
    if (tier === 'T2' && STATE.ai.ready && STATE.ai.engine) {
      const r = await STATE.ai.engine.chat.completions.create({
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMsg }],
        max_tokens: maxTokens,
      });
      return r.choices[0].message.content;
    }
    if (tier === 'T3' && STATE.config.api_key && STATE.config.api_provider) {
      return await aiCloudCall(systemPrompt, userMsg, maxTokens);
    }
    return null;
  }

  async function aiCloudCall(sys, msg, maxTokens) {
    const provider = STATE.config.api_provider;
    const key = STATE.config.api_key;
    const model = STATE.config.api_model || T3_PROVIDERS[provider]?.default;
    if (provider === 'anthropic') {
      const r = await fetch(T3_PROVIDERS.anthropic.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model, max_tokens: maxTokens, system: sys, messages: [{ role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('Anthropic ' + r.status + ': ' + (await r.text()).slice(0, 200));
      const j = await r.json();
      return j.content[0].text;
    }
    if (provider === 'openai') {
      const r = await fetch(T3_PROVIDERS.openai.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: 'system', content: sys }, { role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('OpenAI ' + r.status);
      const j = await r.json();
      return j.choices[0].message.content;
    }
    if (provider === 'google') {
      const r = await fetch(T3_PROVIDERS.google.url + model + ':generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: sys + '\n\n---\n\n' + msg }] }], generationConfig: { maxOutputTokens: maxTokens } }),
      });
      if (!r.ok) throw new Error('Google ' + r.status);
      const j = await r.json();
      return j.candidates[0].content.parts[0].text;
    }
    throw new Error('unknown provider: ' + provider);
  }

  // ─── WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN) ───
  const MESH_CHANNEL = 'fall-signal';
  const STUN_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
  function meshStart(opts) {
    if (STATE.mesh.active) return;
    opts = opts || {};
    const seedId = opts.seedId || (location.pathname + '#' + Math.random().toString(36).slice(2, 8));
    STATE.mesh.seedId = seedId;
    try { STATE.mesh.bc = new BroadcastChannel(MESH_CHANNEL); }
    catch (e) { console.warn('fall-kit: BroadcastChannel unavailable'); return; }
    STATE.mesh.bc.onmessage = e => {
      const m = e.data;
      if (!m || !m.kind || m.peerId === seedId) return;
      if (opts.onMessage) opts.onMessage(m);
    };
    STATE.mesh.bc.postMessage({ kind: 'fall-kit:hello', peerId: seedId, ts: Date.now(), seedName: opts.seedName || 'unknown' });
    STATE.mesh.active = true;
    notify('Mesh active · channel ' + MESH_CHANNEL, 'ok');
  }
  function meshPost(kind, payload) {
    if (!STATE.mesh.active || !STATE.mesh.bc) return false;
    STATE.mesh.bc.postMessage({ kind: kind, peerId: STATE.mesh.seedId, ts: Date.now(), payload: payload });
    return true;

    t.textContent = msg;
    t.style.background = kind === 'err' ? '#a14a2a' : kind === 'ok' ? '#6b8d4a' : '#c08a3a';
    t.style.color = kind === 'err' ? '#fff' : '#0a0a0a';
    t.style.opacity = '1';
    t.style.transform = 'translateX(-50%) translateY(0)';

          <tr><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#c08a3a;font-weight:600">T2</td><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#a89e88">WebLLM in-browser. Pick a model: 1B (700MB, fast) → 3B (2GB, balanced) → 7B (5GB, capable) → 70B (40GB, frontier). One-time download, runs offline forever after. Zero data leaves your device.</td></tr>

  // ─── KCC Mint launcher (v1.2 · fork-this-seed shortcut) ──────────
  function openMint() {
    const slug = (STATE.config.seedName || location.hostname.split('.')[0] || 'seed').replace(/[^a-z0-9-]/gi, '-').toLowerCase();
    const name = document.title.replace(/^[◊·\s]+/, '').split('·')[0].trim() || slug;
    const url = location.href.split('?')[0].split('#')[0];
    const desc = document.querySelector('meta[name="description"]')?.content?.slice(0, 200) || '';
    const params = new URLSearchParams({ fork: '1', parent_slug: slug, parent_name: name, parent_url: url, parent_desc: desc });
    window.open(KCC_MINT_URL + '?' + params.toString(), '_blank', 'noopener');
  }

  // ─── Init ────────────────────────────────────────────────────────
  function init(opts) {
    opts = opts || {};

    if (opts.seedName) STATE.config.seedName = opts.seedName;
    if ($('#fk-ai-chip')) { renderAiChip(); return { version: FALL_KIT_VERSION, mounted: false }; }

    const anchor = opts.chipAnchor ? $(opts.chipAnchor) : null;
    if (anchor) { anchor.appendChild(chip); }
    else {
      chip.style.cssText += ';position:fixed;bottom:14px;left:14px;z-index:9998;box-shadow:0 4px 14px rgba(0,0,0,.4)';
      document.body.appendChild(chip);

    // v1.2 · floating mint button next to chip
    if (!$('#fk-mint-btn') && !opts.hideMint) {
      const mintBtn = document.createElement('button');
      mintBtn.id = 'fk-mint-btn';

      mintBtn.onmouseover = () => { mintBtn.style.background = '#c08a3a'; mintBtn.style.color = '#0a0a0a'; };
      mintBtn.onmouseout  = () => { mintBtn.style.background = 'rgba(10,10,15,.7)'; mintBtn.style.color = '#c08a3a'; };
      mintBtn.onclick = openMint;
      document.body.appendChild(mintBtn);
    }
    renderAiChip();
    return { version: FALL_KIT_VERSION, mounted: true };
  }

  // ─── Public API ──────────────────────────────────────────────────
  root.FallKit = {
    version: FALL_KIT_VERSION,
    init: init,
    aiTier: aiTier,
    aiComplete: aiComplete,
    loadWebLLM: loadWebLLM,
    openSettings: openSettings,
    closeSettings: closeSettings,
    renderAiChip: renderAiChip,
    helpSection: helpSection,
    meshStart: meshStart,
    meshPost: meshPost,
    notify: notify,
    openMint: openMint,  // v1.2 · launch kcc-mint with this seed prefilled as parent
    MODELS: WEBLLM_MODELS,
    PROVIDERS: T3_PROVIDERS,
    state: STATE,
  };
})(typeof window !== 'undefined' ? window : globalThis);

</script>

let db;
const STORES=['state','clients','advisers','firms','feeLedger','feeSchedules','cassEntries','expenses','audit'];
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open(STORE,1);
  r.onupgradeneeded=e=>{const d=e.target.result;for(const s of STORES){if(!d.objectStoreNames.contains(s)){d.createObjectStore(s,{keyPath:'id'})}}};
  r.onsuccess=e=>{db=e.target.result;res(db)};
  r.onerror=()=>rej(r.error);
});}
function txStore(name,mode='readonly'){const tx=db.transaction(name,mode);return tx.objectStore(name)}
function idbPut(store,val){return new Promise(r=>{const req=txStore(store,'readwrite').put(val);req.onsuccess=()=>r(true);req.onerror=()=>r(false)})}
function idbDel(store,key){return new Promise(r=>{const req=txStore(store,'readwrite').delete(key);req.onsuccess=()=>r(true)})}
function idbGetAll(store){return new Promise(r=>{const req=txStore(store).getAll();req.onsuccess=()=>r(req.result||[]);req.onerror=()=>r([])})}
function idbGet(store,key){return new Promise(r=>{const req=txStore(store).get(key);req.onsuccess=()=>r(req.result);req.onerror=()=>r(null)})}

async function appendAudit(action,reasoning,payload){
  if(!state.settings.auditChain)return;
  const prev=state.audit.length?state.audit[state.audit.length-1]:null;
  const prevHash=prev?prev.hash:'';
  const docStr=JSON.stringify(payload||{});
  const docHash=await sha256(docStr);
  const i=(prev?prev.i:0)+1;
  const ts=Date.now();
  const hash=await sha256(prevHash+docHash+ts+i);
  const entry={id:'au_'+i+'_'+ts,i,ts,tool:TOOLNAME,configVersion:TOOLNAME+'@'+VERSION,adviserId:'',clientId:payload?.clientId||'',action,reasoning:reasoning||'',prevHash,docHash,hash,payload:payload||{}};
  state.audit.push(entry);
  if(state.audit.length>5000)state.audit=state.audit.slice(-5000);
  await idbPut('audit',entry);
}

// ─── Recurring fee cron-on-open ───
async function runScheduleCron(){
  let generated=0;
  const today=now();
  for(const s of state.feeSchedules){
    if(!s.active)continue;
    while(s.nextDueAt&&s.nextDueAt<=today){
      const cl=state.clients.find(c=>c.id===s.clientId);
      const fee={
        id:'fl_'+uid(),clientId:s.clientId,adviserId:s.adviserId,firmId:s.firmId||state.firm?.id||'',
        ts:s.nextDueAt,dateOf:isoDate(s.nextDueAt),
        type:'ongoing',basis:s.basis||'AUM%',
        description:(s.description||'Recurring fee')+' · auto-generated',
        gross:s.amount,vat:0,net:s.amount,
        status:'invoiced',invoiceId:'INV-AUTO-'+(state.feeLedger.length+1).toString().padStart(4,'0'),
        receivedAt:null,
        allocations:[{adviserId:s.adviserId,costCentreId:'',share:1.0}],
        scheduleId:s.id,
      };
      state.feeLedger.push(fee);await idbPut('feeLedger',fee);
      generated++;
      // advance
      s.nextDueAt=advanceDate(s.nextDueAt,s.frequency);
    }
    await idbPut('feeSchedules',s);
  }
  if(generated){await appendAudit('schedule.cron.generated','Cron generated recurring fees',{count:generated});toast(generated+' recurring fee(s) generated')}
}
function advanceDate(ts,freq){const d=new Date(ts);if(freq==='monthly')d.setMonth(d.getMonth()+1);else if(freq==='quarterly')d.setMonth(d.getMonth()+3);else if(freq==='annually')d.setFullYear(d.getFullYear()+1);else d.setMonth(d.getMonth()+1);return d.getTime()}

let chFallClient=null, chFallSignal=null;
function setupMesh(){
  try{
    chFallClient=new BroadcastChannel('fall-client');
    chFallClient.addEventListener('message',onFallClientMsg);
    // boot sync request
    chFallClient.postMessage({v:1,type:'sync.request',ts:now(),source:TOOLNAME,payload:{}});
  }catch(e){}
  try{
    chFallSignal=new BroadcastChannel('fall-signal');
    chFallSignal.postMessage({source:TOOLNAME,type:'hello',prime:PRIME,version:VERSION,ts:now()});
    chFallSignal.addEventListener('message',async e=>{
      const m=e.data;if(!m)return;
      if(m.type==='ping')chFallSignal.postMessage({source:TOOLNAME,type:'pong',prime:PRIME});
      if(m.source==='si-didy'&&m.type==='query'&&m.intent){const ans=await answerQuestion(m.intent);chFallSignal.postMessage({source:TOOLNAME,type:'answer',replyTo:m.id,text:ans.text})}
    });
  }catch(e){}
}
async function onFallClientMsg(e){
  const m=e.data;if(!m||m.source===TOOLNAME)return;
  if(m.type==='sync.request'){
    chFallClient.postMessage({v:1,type:'sync.snapshot',ts:now(),source:TOOLNAME,payload:{clients:state.clients,advisers:state.advisers,firm:state.firm}});
    return;
  }
  if(m.type==='sync.snapshot'){
    const p=m.payload||{};
    if(p.firm&&(!state.firm||(p.firm.updatedAt||0)>(state.firm.updatedAt||0))){state.firm=p.firm;await idbPut('firms',p.firm)}
    if(Array.isArray(p.clients))for(const c of p.clients){const ex=state.clients.find(x=>x.id===c.id);if(!ex||(c.updatedAt||0)>(ex.updatedAt||0)){if(ex)Object.assign(ex,c);else state.clients.push(c);await idbPut('clients',c)}}
    if(Array.isArray(p.advisers))for(const a of p.advisers){const ex=state.advisers.find(x=>x.id===a.id);if(!ex||(a.updatedAt||0)>(ex.updatedAt||0)){if(ex)Object.assign(ex,a);else state.advisers.push(a);await idbPut('advisers',a)}}
    render();return;
  }
  if(m.type==='client.created'||m.type==='client.updated'){
    const c=m.payload;if(!c||!c.id)return;
    const ex=state.clients.find(x=>x.id===c.id);
    if(ex)Object.assign(ex,c);else state.clients.push(c);
    await idbPut('clients',c);
    render();return;
  }
  if(m.type==='client.archived'){
    const c=m.payload;if(!c||!c.id)return;
    const ex=state.clients.find(x=>x.id===c.id);if(ex){ex.archivedAt=c.archivedAt||now();await idbPut('clients',ex)}
    // warn if open ongoing schedule
    const openSched=state.feeSchedules.find(s=>s.clientId===c.id&&s.active);
    if(openSched){toast('warning: archived client has active fee schedule')}
    render();return;
  }
  if(m.type==='adviser.created'||m.type==='adviser.updated'){
    const a=m.payload;if(!a||!a.id)return;
    const ex=state.advisers.find(x=>x.id===a.id);
    if(ex)Object.assign(ex,a);else state.advisers.push(a);
    await idbPut('advisers',a);render();return;
  }
  if(m.type==='firm.updated'){
    if(m.payload){state.firm=m.payload;await idbPut('firms',m.payload);render()}
    return;
  }
}

// ─── Fee analytics ───
function feesForClient(clientId){return state.feeLedger.filter(f=>f.clientId===clientId)}
function feesForAdviser(adviserId){
  // count by allocations (a fee can be split across advisers)
  return state.feeLedger.map(f=>{
    const alloc=(f.allocations||[]).find(a=>a.adviserId===adviserId);
    if(!alloc)return null;
    return {fee:f,share:alloc.share||0,attributable:(f.net||0)*(alloc.share||0)};
  }).filter(Boolean);
}
function totalFirmRevenue(opts){
  opts=opts||{};
  let total=0;
  for(const f of state.feeLedger){
    if(opts.received&&f.status!=='received')continue;
    if(opts.month&&monthKey(f.ts)!==opts.month)continue;
    if(opts.year&&new Date(f.ts).getFullYear()!==opts.year)continue;
    if(opts.type&&f.type!==opts.type)continue;
    total+=(f.net||0);
  }
  return total;
}
function ytdFees(){const y=new Date().getFullYear();return totalFirmRevenue({year:y})}
function mtdFees(){return totalFirmRevenue({month:monthKey(now())})}
function feesByType(){
  const types=['initial','ongoing','one-off','transactional','trail-commission'];
  const map={};for(const t of types)map[t]=0;
  for(const f of state.feeLedger){if(map[f.type]===undefined)map[f.type]=0;map[f.type]+=(f.net||0)}
  return map;
}
function feesByMonth(n){
  // last n months ending current
  const map=new Map();
  const d=new Date();d.setDate(1);
  for(let i=n-1;i>=0;i--){const dd=new Date(d.getFullYear(),d.getMonth()-i,1);map.set(monthKey(dd),{initial:0,ongoing:0,'one-off':0,transactional:0,'trail-commission':0,total:0})}
  for(const f of state.feeLedger){
    const k=monthKey(f.ts);if(!map.has(k))continue;
    const e=map.get(k);if(e[f.type]===undefined)e[f.type]=0;e[f.type]+=(f.net||0);e.total+=(f.net||0);
  }
  return [...map.entries()].map(([k,v])=>({month:k,...v}));
}
function vatTotalQuarter(){
  // current quarter VAT collected
  const d=new Date();const q=Math.floor(d.getMonth()/3);const startM=q*3;
  const start=new Date(d.getFullYear(),startM,1).getTime();
  const end=new Date(d.getFullYear(),startM+3,1).getTime();
  let v=0;for(const f of state.feeLedger){if(f.ts>=start&&f.ts<end)v+=(f.vat||0)}
  return {quarter:'Q'+(q+1)+' '+d.getFullYear(),vat:v};
}

function clientYtdFees(clientId){const y=new Date().getFullYear();return feesForClient(clientId).filter(f=>new Date(f.ts).getFullYear()===y).reduce((a,f)=>a+(f.net||0),0)}
function nextDueForClient(clientId){const s=state.feeSchedules.filter(s=>s.clientId===clientId&&s.active).sort((a,b)=>a.nextDueAt-b.nextDueAt)[0];return s?s.nextDueAt:null}
function lastInvoiceForClient(clientId){const arr=feesForClient(clientId).slice().sort((a,b)=>b.ts-a.ts);return arr[0]||null}

function clientRIY(c){const pv=clientPortfolioValue(c);const ongoing=feesForClient(c.id).filter(f=>f.type==='ongoing').reduce((a,f)=>a+(f.net||0),0);if(!pv||!ongoing)return 0;return ongoing/pv}

const T0_RULES=[
  {id:'cass',match:/what'?s? ?(is)? ?cass|client money|segregat/i,answer:()=>`**CASS · Client Assets Sourcebook (FCA)**

CASS sets the rules for how firms hold and protect *client money* and custody assets. Key parts for an IFA practice:

- **CASS 7** · client money rules (segregation, reconciliation, trust)
- **CASS 7.13** · daily reconciliation expected; gaps must be investigated
- **Statutory trust** · client money must be held in a designated client bank account, separate from firm money
- **CMAR** · Client Money & Assets Return — quarterly for firms holding client money

Most IFAs **don't hold client money** (they use platforms/custodians instead), in which case CASS doesn't bite hard. But the moment a cheque made out to the firm passes through your hands, CASS applies.

You currently track ${money(cassTotalHeld())} in the CASS tab · last reconciled ${lastReconciliation()?daysSinceReconciliation()+' days ago':'never'}.`},
  {id:'vat',match:/vat ?(on|for|exempt)|is.+(advice|adviser).+vat|vatable/i,answer:()=>`**VAT on adviser fees (UK):**

- **Exempt** · advice on regulated financial products (ISAs, pensions, investment portfolios) when the intention is to arrange a transaction — falls under VATA 1994 Sch 9 Group 5 (insurance + investment products).
- **Standard-rated (20%)** · pure admin, report production, ongoing reviews where no transactional intent exists. HMRC has tightened on this.
- The 2024 HMRC Brief reaffirmed that **'intermediation'** (bringing client + product together) is exempt; pure 'comfort reviews' aren't.

Practical: most ongoing advice fees you currently take are likely exempt, but flag execution-only and discretionary admin fees as VATable. The fee ledger has a per-entry VAT field — use it.

Firm VAT-registered threshold: ${money(RULES.vatRegThreshold)} turnover. Current YTD fees: ${money(ytdFees())}.`},
  {id:'recon',match:/reconcil|how often.+(client money|cass)/i,answer:()=>`**CASS reconciliation cadence:**

- **Internal reconciliation** · CASS 7.15.12R · *each business day* for client money. The firm compares its internal records (FallPractice's ledger) with the actual bank balance.
- **External reconciliation** · CASS 7.15.20R · *at least monthly* against bank statements.
- Discrepancies must be investigated **same day** and either reflected, returned, or topped up by the firm's own money.

Status: last reconciliation ${lastReconciliation()?'was '+daysSinceReconciliation()+' days ago':'has never been logged'}.
- Amber after ${RULES.cassAmberDays} days · Red after ${RULES.cassRedDays} days.
${daysSinceReconciliation()>RULES.cassAmberDays?'⚠ Overdue.':'OK.'}`},
  {id:'fca-fee',match:/fca fee|periodic fee|when.+(fca|invoice)/i,answer:()=>`**FCA periodic (annual) fee:**

- Invoices issued by FCA in **July** each year, due by **end of August** (firms get a 30-day window).
- Minimum periodic fee for small firms: typically around ${money(RULES.fcaFeeMinimum)} (varies year to year).
- Fee blocks for IFAs: usually A.13 (advisory arrangers, no client money) or A.12 (with client money). RMAR-driven.
- FSCS levy invoiced separately (also July/August).
- Professional body fees (CISI/PFS) invoiced separately, usually January.

Your estimate set: ${money(state.settings.fcaAnnualEstimate||0)}/yr · accruing ${money(fcaMonthlyAccrual())}/month.
${piDaysToExpiry()!==null?'PI policy expires in '+piDaysToExpiry()+' days.':''}`},
  {id:'pi-min',match:/pi (insurance|minimum|cover)|professional indemnit/i,answer:()=>`**PI insurance minimums (IDD / MiFID II aligned):**

- **Single claim** · €1.3m (≈ ${money(RULES.piMinCoverSingle)})
- **Aggregate** · €1.924m (≈ ${money(RULES.piMinCoverAggregate)})
- Personal investment firms specifically: PROF 1 + MIPRU 3 require PI as continuing operational condition.
- Excess: typically £5k-£25k per claim; **must be capitalised** if above £5k per FCA expectations.
- Cover from a UK or EEA insurer authorised in general insurance.

Your firm: ${state.firm?.piInsurer||'(insurer not set)'} · policy ${state.firm?.piPolicyNo||'(none)'} · expires ${state.firm?.piExpiresAt?isoDate(state.firm.piExpiresAt):'(not set)'} · monthly accrual ${money(piMonthlyAccrual())}.
${piDaysToExpiry()!==null&&piDaysToExpiry()<60?'⚠ Renewal due in '+piDaysToExpiry()+' days — start the broker conversation now.':''}`},
  {id:'regdata',match:/regdata|gabriel|rmar|return.+(due|submission)/i,answer:()=>`**FCA RegData (formerly GABRIEL) submissions for IFAs:**

- **RMAR** (Retail Mediation Activities Return) — **half-yearly** for most personal investment firms.
- RMA reporting periods typically end 30 June and 31 December; submissions due **30 working days** after period end.
- Other returns: **CCR007** quarterly for some, **FSA002** (capital adequacy) annual.
- Late submission: £250 fixed penalty + reputational notes on firm record.

Next windows roughly:
- Jul-Aug · 30 June period
- Jan-Feb · 31 December period

The RegData tab has a "what to gather" checklist. FallPractice **doesn't submit** for you — that remains your responsibility through the FCA portal.`},
  {id:'audit',match:/audit chain|why.+audit|prevhash/i,answer:()=>`**Audit chain (Mansoor P3):**

Every state change in FallPractice appends a cryptographic entry:
\`{i, ts, action, prevHash, docHash, hash}\`
where \`hash = sha256(prevHash + docHash + ts + i)\`.

Any tampering breaks the chain — verifiable in the Settings tab. Export as JSON for compliance review (FCA SYSC requires records for 5 years; client files 7 years; pensions life-of-record).

Currently ${state.audit.length} entries in chain.`},
  {id:'trail',match:/trail commission|legacy commission|adviser charging/i,answer:()=>`**Trail commission (post-RDR):**

- The 2012 Retail Distribution Review banned **new** trail commission on advised retail investment products.
- **Legacy trail** on pre-2013 business can still pay until product matures or transfers — track it under \`type:'trail-commission'\` in the fee ledger.
- Trail commission on **protection products** (life, CI, IP) was *not* banned by RDR and is still allowed.
- Disclose all trail to the client at every periodic review (COBS 6).

Current trail entries: ${state.feeLedger.filter(f=>f.type==='trail-commission').length} · totalling ${money(state.feeLedger.filter(f=>f.type==='trail-commission').reduce((a,f)=>a+(f.net||0),0))}.`},
  {id:'consumer-duty',match:/consumer duty|fair value|price.+value/i,answer:()=>`**Consumer Duty (PRIN 12 · July 2023):**

Four outcomes:
1. **Products & services** · fit target market
2. **Price & value** · fair value (not the cheapest, the most appropriate)
3. **Consumer understanding** · clear, fair, not misleading
4. **Consumer support** · throughout the lifecycle

Firms must produce an **annual Consumer Duty board report** evidencing each outcome.

For fee setting specifically: document the *value assessment* — what does the client get for the ongoing fee? Periodic reviews? Tax planning? Cashflow modelling? Access to adviser?

FallPaper has the board-report template scaffold. FallPractice's per-client fee dashboard shows the RIY (reduction-in-yield) — useful evidence.`},
  {id:'7y',match:/(how long|retention|keep).+(records?|files?)/i,answer:()=>`**Record retention (FCA SYSC 9 / COBS):**

- **Client files (KYC, suitability, advice)** · 5 years minimum, but **indefinite** for pension transfers per FG21/3 (life-of-product is safe).
- **Marketing material** · 5 years
- **Customer complaints** · 5 years
- **Financial records** · 6 years (Companies Act for limited companies)
- **AML records** · 5 years from end of business relationship

Practical: **7 years** is the common safe-harbour figure most firms run with. FallPractice retains the audit chain indefinitely (just keep exporting). IDB lives on-device — back up.`},
  {id:'sm-cr',match:/smcr|senior managers? regime|smf/i,answer:()=>`**SM&CR for small IFA firms (Core / Limited Scope):**

- **Senior Managers** · need FCA approval; statement of responsibilities; annual fitness & propriety check.
- Common SMFs for small IFAs: **SMF3** (executive director), **SMF22** (chief executive), **SMF27** (partner).
- **Certified persons** · anyone who could cause significant harm (most advisers) · firm certifies them annually, no FCA approval.
- **Conduct Rules** · apply to *everyone* in the firm; breach reporting to FCA via FORM H.

Your advisers: ${state.advisers.length} configured · ${state.advisers.filter(a=>a.smcrRole).length} with SMF role recorded.`},
  {id:'fscs',match:/fscs|compensation scheme/i,answer:()=>`**FSCS · Financial Services Compensation Scheme:**

- IFA investment claims compensation limit: **£85,000** per person per failed firm.
- Levy: paid annually, invoiced by FCA in July/August alongside periodic fee.
- Levy class for IFAs: **SC02** (Life Distribution & Investment Intermediation).
- Recent annual SC02 levies have ranged £130m-£330m across the class — your firm's share scales with eligible income reported on RMAR.

Track FSCS levy in the Expenses tab as a separate line so you can see the year-on-year cost trend.`},
];
async function answerQuestion(q){
  for(const r of T0_RULES){if(r.match.test(q))return{src:'T0 · UK IFA rules engine',text:r.answer()}}
  const tier=await Cascade.detectTier();
  if(tier!=='T0'){
    const ctx=`Firm: ${state.firm?.name||'(not set)'} · FCA ref ${state.firm?.fcaRefNo||'(n/a)'}
Advisers: ${state.advisers.length} · Clients: ${state.clients.length}
YTD fees: ${money(ytdFees())} · MTD fees: ${money(mtdFees())}
CASS held: ${money(cassTotalHeld())} · last reconciled ${daysSinceReconciliation()}d ago
PI expires: ${state.firm?.piExpiresAt?isoDate(state.firm.piExpiresAt):'(unset)'}
Monthly fixed accruals: ${money(expectedFixedCostMonthly())}`;
    const sys=`You are FallPractice, a sovereign UK IFA firm-accounting tool. You support firm-side admin: fees, CASS, PI, FCA, P&L. You are NOT a regulatory submission system — FCA RegData remains the firm's responsibility. Always be concrete, cite £ amounts, prefer UK terminology, end with 'Verify with your compliance consultant before acting.'

Firm context:
${ctx}`;
    const r=await Cascade.generate(sys,q,1200);
    if(r.text)return{src:r.tier,text:r.text};
  }
  return{src:'T0 · fallback',text:`No rule match. Try: "what is CASS?", "is adviser advice VAT-exempt?", "how often must I reconcile client money?", "when is the FCA fee due?", "what is the PI minimum cover?", "RegData submission window".

Or add an API key in Settings for grounded answers.`};
}

function nextRMARWindow(){
  // RMAR periods end 30 June + 31 December · due 30 working days after
  const d=new Date();const yr=d.getFullYear();
  const jun30=new Date(yr,5,30).getTime();
  const dec31=new Date(yr,11,31).getTime();
  let pEnd;
  if(d.getTime()<=jun30+30*dayMs)pEnd=jun30;
  else if(d.getTime()<=dec31+30*dayMs)pEnd=dec31;
  else pEnd=new Date(yr+1,5,30).getTime();
  const opens=pEnd+dayMs;
  // 30 working days ≈ 42 calendar days
  const due=pEnd+42*dayMs;
  return {periodEnd:isoDate(pEnd),opens:isoDate(opens),due:isoDate(due),daysToDue:daysBetween(now(),due)};
}

async function saveCass(){

  await appendAudit('cass.entry','User added CASS entry',{id:e.id,type:e.type,amount:e.amount});

}

async function saveExpense(){

  state.expenses.push(e);await idbPut('expenses',e);

  closeModal();toast('expense saved');render();
}
async function seedMonthlyAccruals(){
  const m=monthKey(now());
  const items=[
    {type:'PI insurance',amount:piMonthlyAccrual(),notes:'Monthly accrual (auto)'},
    {type:'FCA fees',amount:fcaMonthlyAccrual(),notes:'Monthly accrual (auto)'},
    {type:'Professional body',amount:profBodyMonthlyAccrual(),notes:'Monthly accrual (auto)'},
  ];
  let added=0;
  for(const it of items){
    if(!it.amount)continue;
    const exists=state.expenses.find(e=>e.month===m&&e.type===it.type&&(e.notes||'').includes('auto'));
    if(exists)continue;
    const e={id:'ex_'+uid(),month:m,type:it.type,amount:it.amount,notes:it.notes,ts:now()};
    state.expenses.push(e);await idbPut('expenses',e);added++;
  }
  await appendAudit('expense.accruals.seeded','Monthly accruals seeded',{month:m,count:added});
  toast(added+' accruals seeded');render();
}

window.KONOMI={active:true,tier:'sovereign',prime:PRIME,version:VERSION,check:()=>({ok:true,tier:'sovereign',prime:PRIME})};

document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openPalette()}
  if(e.key==='Escape'){closePalette();closeModal()}
});
document.addEventListener('click',e=>{if(e.target.classList?.contains('palette-bg'))closePalette();if(e.target.classList?.contains('modal-bg'))closeModal()});
document.addEventListener('keypress',e=>{if(e.key==='Enter'&&document.activeElement?.id==='pInput')paletteRun()});

window.addEventListener('message',async e=>{
  const m=e.data;if(!m||typeof m!=='object')return;
  if(m.type==='fall-rpc'){
    let r={ok:false};
    if(m.action==='ping')r={ok:true,tool:TOOLNAME,prime:PRIME,version:VERSION};
    else if(m.action==='ask'&&m.question){const a=await answerQuestion(m.question);r={ok:true,answer:a.text,src:a.src}}
    else if(m.action==='ledger')r={ok:true,count:state.feeLedger.length,ytd:ytdFees(),mtd:mtdFees()};
    try{e.source&&e.source.postMessage({type:'fall-rpc-r',id:m.id,result:r},'*')}catch(err){}
  }
});

  version:VERSION,prime:PRIME,

  ytd:ytdFees,mtd:mtdFees,
  cassHeld:cassTotalHeld,

};
